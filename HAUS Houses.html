document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  --ink-4: #B0ADA6;     /* warm gray — disabled/placeholder */\n\n  /* ── Canvas (backgrounds) ── */\n  --canvas-0: #FFFFFF;  /* pure white — elevated surfaces, cards */\n  --canvas-1: #F8F7F3;  /* warm off-white — page background */\n  --canvas-2: #F0EDE6;  /* cream — secondary surface, hover states */\n  --canvas-3: #E5E1D9;  /* warm gray — sunken, divider bg */\n\n  /* ── Border ── */\n  --border-1: #E5E1D9;  /* subtle — default divider */\n  --border-2: #CECAC1;  /* medium — input, card border */\n  --border-3: #A8A49C;  /* strong — emphasized borders */\n\n  /* ── Forest (primary accent — deeptech / science / growth) ── */\n  --forest-1: #0F2419;\n  --forest-2: #1C3B2D;  /* base — sidebar, primary CTA */\n  --forest-3: #2A5C46;\n  --forest-4: #3D8C6A;\n  --forest-5: #BDDDD3;  /* tint — badge backgrounds */\n\n  /* ── Bronze (secondary accent — investment / premium / warmth) ── */\n  --bronze-1: #6B4E2A;\n  --bronze-2: #9A7040;\n  --bronze-3: #B8924A;  /* base — highlights, secondary CTAs */\n  --bronze-4: #D4B07C;\n  --bronze-5: #F2E8D5;  /* tint — badge backgrounds */\n\n  /* ── Steel (tertiary accent — data / technical / institutional) ── */\n  --steel-1: #0F2030;\n  --steel-2: #1A3D5C;   /* base — charts, data contexts */\n  --steel-3: #2A6090;\n  --steel-4: #4A90C4;\n  --steel-5: #C8DFEF;   /* tint — badge backgrounds */\n\n  /* ── Semantic ── */\n  --positive:    #1B7A48;\n  --positive-bg: #D8F0E5;\n  --warning:     #C47A1A;\n  --warning-bg:  #FDF0D5;\n  --negative:    #B83232;\n  --negative-bg: #F5D5D5;\n  --info:        #1A4E8A;\n  --info-bg:     #D5E5F8;\n\n  /* ── House palettes (12 geographically-anchored residency tracks) ── */\n  /* Each house: --house-{name} = text color, --house-{name}-bg = surface/tile bg */\n\n  --house-cell:       #2A587A;  /* CellHaus — Kobe, JP — Allogeneic Cell Therapy */\n  --house-cell-bg:    #C4D8E8;\n\n  --house-trial:      #1A6850;  /* TrialHaus — Australia — Clinical Trials */\n  --house-trial-bg:   #C0E0D0;\n\n  --house-onc:        #7A5010;  /* OncHaus — New York — Oncology */\n  --house-onc-bg:     #F0D890;\n\n  --house-tool:       #283858;  /* ToolHaus — Boston — Tools Development */\n  --house-tool-bg:    #C0CCD8;\n\n  --house-bio:        #286820;  /* BioHaus — Mexico — Industrial Biotech */\n  --house-bio-bg:     #A0D878;\n\n  --house-pharm:      #2A5888;  /* PharmHaus — Puerto Rico — Pharma Manufacturing */\n  --house-pharm-bg:   #D4E8F4;\n\n  --house-diag:       #782030;  /* DiagHaus — United Kingdom — Diagnostics */\n  --house-diag-bg:    #E8C4C4;\n\n  --house-desci:      #2A6018;  /* DeSciHaus — Buenos Aires — DeSci / Agriculture */\n  --house-desci-bg:   #B8D898;\n\n  --house-lux:        #7A5810;  /* LuxHaus — Paris — Luxury Technology */\n  --house-lux-bg:     #F0E0B0;\n\n  --house-sensor:     #404858;  /* SensorHaus — Zurich — Sensor Development */\n  --house-sensor-bg:  #D4D8E4;\n\n  --house-cro:        #782820;  /* CROHaus — Shanghai — Contract Research */\n  --house-cro-bg:     #F0C8C0;\n\n  --house-fab:        #3A4E6A;  /* FabHaus — Shenzhen — Fabrication */\n  --house-fab-bg:     #C8D4E4;\n\n  --house-neuro:      #3A306A;  /* NeuroHaus — Baltimore — Neurotech */\n  --house-neuro-bg:   #D4CFEC;\n\n  --house-war:        #3A3D45;  /* WarHaus — Warsaw — Defense */\n  --house-war-bg:     #C8CBD0;\n\n  --house-blue:       #15607E;  /* BlueHaus — Miami — Marine Technology */\n  --house-blue-bg:    #BCE0EC;\n\n  --house-pub:        #8A2D52;  /* PubHaus — Los Angeles — Science Media */\n  --house-pub-bg:     #F0CEDC;\n\n  /* ── Semantic aliases ── */\n  --color-bg:             var(--canvas-1);\n  --color-surface:        var(--canvas-0);\n  --color-text:           var(--ink-1);\n  --color-text-secondary: var(--ink-2);\n  --color-text-muted:     var(--ink-3);\n  --color-text-disabled:  var(--ink-4);\n  --color-border:         var(--border-1);\n  --color-border-strong:  var(--border-2);\n  --color-accent:         var(--forest-2);\n  --color-accent-warm:    var(--bronze-3);\n  --color-accent-cool:    var(--steel-2);\n}\n\n/* Haus Fund — Typography Tokens */\n\n:root {\n  /* ── Font families ── */\n  --font-display: 'Barlow Condensed', sans-serif;   /* impact headlines, stat values */\n  --font-heading: 'Barlow', sans-serif;              /* section headings, nav */\n  --font-body:    'DM Sans', sans-serif;             /* UI text, body copy, labels */\n  --font-mono:    'DM Mono', monospace;              /* numbers, code, financial data */\n\n  /* ── Type scale ── */\n  --text-xs:   11px;\n  --text-sm:   13px;\n  --text-base: 15px;\n  --text-md:   16px;\n  --text-lg:   18px;\n  --text-xl:   22px;\n  --text-2xl:  28px;\n  --text-3xl:  36px;\n  --text-4xl:  48px;\n  --text-5xl:  64px;\n  --text-hero: 80px;\n\n  /* ── Line heights ── */\n  --leading-none:    1;\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* ── Font weights ── */\n  --weight-light:     300;\n  --weight-regular:   400;\n  --weight-medium:    500;\n  --weight-semibold:  600;\n  --weight-bold:      700;\n  --weight-extrabold: 800;\n  --weight-black:     900;\n\n  /* ── Letter spacing ── */\n  --tracking-tight:  -0.02em;\n  --tracking-normal:  0em;\n  --tracking-wide:    0.04em;\n  --tracking-wider:   0.08em;\n  --tracking-caps:    0.12em;   /* for uppercase labels */\n}\n\n/* Haus Fund — Spacing Tokens (4px base unit) */\n\n:root {\n  --space-px:   1px;\n  --space-0-5:  2px;\n  --space-1:    4px;\n  --space-2:    8px;\n  --space-3:    12px;\n  --space-4:    16px;\n  --space-5:    20px;\n  --space-6:    24px;\n  --space-7:    28px;\n  --space-8:    32px;\n  --space-10:   40px;\n  --space-12:   48px;\n  --space-14:   56px;\n  --space-16:   64px;\n  --space-20:   80px;\n  --space-24:   96px;\n  --space-32:   128px;\n  --space-40:   160px;\n  --space-48:   192px;\n\n  /* ── Layout containers ── */\n  --container-xs:  480px;\n  --container-sm:  640px;\n  --container-md:  768px;\n  --container-lg:  1024px;\n  --container-xl:  1280px;\n  --container-2xl: 1536px;\n\n  /* ── Named layout slots ── */\n  --sidebar-width:  240px;\n  --header-height:  56px;\n  --content-max:    var(--container-xl);\n}\n\n/* Haus Fund — Effects Tokens (shadows, radii, transitions) */\n\n:root {\n  /* ── Border radii ── */\n  --radius-none: 0px;\n  --radius-xs:   2px;    /* tags, badges */\n  --radius-sm:   4px;    /* small buttons, chips */\n  --radius-md:   6px;    /* inputs, standard buttons */\n  --radius-lg:   10px;   /* cards */\n  --radius-xl:   16px;   /* modal dialogs, large panels */\n  --radius-2xl:  24px;   /* hero banners */\n  --radius-full: 9999px; /* pill buttons, avatars */\n\n  /* ── Shadows (warm-tinted, never cold blue) ── */\n  --shadow-xs: 0 1px 2px rgba(13, 13, 13, 0.06);\n  --shadow-sm: 0 1px 4px rgba(13, 13, 13, 0.06), 0 1px 2px rgba(13, 13, 13, 0.04);\n  --shadow-md: 0 4px 12px rgba(13, 13, 13, 0.08), 0 1px 3px rgba(13, 13, 13, 0.04);\n  --shadow-lg: 0 8px 24px rgba(13, 13, 13, 0.10), 0 2px 6px rgba(13, 13, 13, 0.04);\n  --shadow-xl: 0 16px 48px rgba(13, 13, 13, 0.12), 0 4px 12px rgba(13, 13, 13, 0.05);\n  --shadow-inset: inset 0 1px 3px rgba(13, 13, 13, 0.08);\n\n  /* ── Easing ── */\n  --ease-default: cubic-bezier(0.2, 0, 0, 1);  /* @kind other */ /* fast-out, slight precision feel */\n  --ease-in:      cubic-bezier(0.4, 0, 1, 1);   /* @kind other */\n  --ease-out:     cubic-bezier(0, 0, 0.2, 1);   /* @kind other */\n  --ease-spring:  cubic-bezier(0.34, 1.4, 0.64, 1); /* @kind other */ /* subtle spring — use sparingly */\n\n  /* ── Durations ── */\n  --duration-fast:   100ms;   /* @kind other */\n  --duration-base:   160ms;   /* @kind other */\n  --duration-slow:   280ms;   /* @kind other */\n\n  /* ── Transition shortcuts ── */\n  --transition-default: all var(--duration-base) var(--ease-default);\n  --transition-color:   color var(--duration-fast) var(--ease-default),\n                        background-color var(--duration-fast) var(--ease-default),\n                        border-color var(--duration-fast) var(--ease-default);\n  --transition-shadow:  box-shadow var(--duration-base) var(--ease-default);\n  --transition-transform: transform var(--duration-fast) var(--ease-default);\n}\n\n<\u002Fstyle>\n<style>\n* { box-sizing: border-box; margin: 0; }\nbody { display: flex; flex-direction: column; height: 564px; font-family: var(--font-heading); background: var(--canvas-1); }\n\n/* ── Tweaks bar ── */\n#tw { height: 44px; background: #fff; border-bottom: 1px solid var(--border-1); display: flex; align-items: center; padding: 0 14px; gap: 18px; flex-shrink: 0; }\n.tw-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); font-family: var(--font-mono); }\n.tw-group { display: flex; align-items: center; gap: 6px; }\n.tw-name { font-size: 12px; font-weight: 600; color: var(--ink-2); font-family: var(--font-body); }\n.col-btn { padding: 2px 9px; border: 1px solid var(--border-2); border-radius: 3px; cursor: pointer; font-size: 11px; font-family: var(--font-body); background: var(--canvas-1); color: var(--ink-2); transition: all 100ms; }\n.col-btn.active { background: var(--forest-5); color: var(--forest-2); border-color: var(--forest-2); font-weight: 700; }\n.tw-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--ink-2); font-family: var(--font-body); }\n.tw-toggle input { cursor: pointer; accent-color: var(--forest-2); width: 13px; height: 13px; }\n.tw-sep { width: 1px; height: 20px; background: var(--border-1); flex-shrink: 0; }\n\n/* ── Tile grid ── */\n#grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(0,0,0,0.07); }\n.tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; padding: 14px 10px; overflow: hidden; background: white; }\n.mark { height: 44px; object-fit: contain; }\n.wm { font-size: 14px; letter-spacing: 0.04em; line-height: 1; display: flex; align-items: baseline; }\n.pre  { font-weight: 900; }\n.haus { font-weight: 400; }\n.city { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.45; margin-top: -3px; }\n.spec { font-family: var(--font-body); font-size: 9px; opacity: 0.55; text-align: center; line-height: 1.35; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ── Tweaks bar ── -->\n<div id=\"tw\">\n  <span class=\"tw-lbl\">Tweaks<\u002Fspan>\n  <div class=\"tw-sep\"><\u002Fdiv>\n  <div class=\"tw-group\">\n    <span class=\"tw-name\">Columns<\u002Fspan>\n    <button class=\"col-btn\" data-n=\"3\" onclick=\"setCol(3)\">3<\u002Fbutton>\n    <button class=\"col-btn active\" data-n=\"4\" onclick=\"setCol(4)\">4<\u002Fbutton>\n    <button class=\"col-btn\" data-n=\"5\" onclick=\"setCol(5)\">5<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tw-sep\"><\u002Fdiv>\n  <label class=\"tw-toggle\"><input type=\"checkbox\" id=\"t-city\" checked=\"\" onchange=\"toggle('.city',this.checked)\"> City<\u002Flabel>\n  <label class=\"tw-toggle\"><input type=\"checkbox\" id=\"t-spec\" checked=\"\" onchange=\"toggle('.spec',this.checked)\"> Specialty<\u002Flabel>\n  <div class=\"tw-sep\"><\u002Fdiv>\n  <label class=\"tw-toggle\"><input type=\"checkbox\" id=\"t-neuro\" checked=\"\" onchange=\"toggleNeuro(this.checked)\"> <span style=\"color:var(--house-neuro);\">NeuroHaus<\u002Fspan><\u002Flabel>\n  <label class=\"tw-toggle\"><input type=\"checkbox\" id=\"t-war\" checked=\"\" onchange=\"toggleWar(this.checked)\"> <span style=\"color:var(--house-war);\">WarHaus<\u002Fspan><\u002Flabel>\n  <label class=\"tw-toggle\"><input type=\"checkbox\" id=\"t-blue\" checked=\"\" onchange=\"toggleBlue(this.checked)\"> <span style=\"color:var(--house-blue);\">BlueHaus<\u002Fspan><\u002Flabel>\n  <label class=\"tw-toggle\"><input type=\"checkbox\" id=\"t-pub\" checked=\"\" onchange=\"togglePub(this.checked)\"> <span style=\"color:var(--house-pub);\">PubHaus<\u002Fspan><\u002Flabel>\n<\u002Fdiv>\n\n<!-- ── Tile grid ── -->\n<div id=\"grid\">\n\n  <div class=\"tile\" style=\"background:#C4D8E8\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">CELL<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">KOBE<\u002Fdiv>\n    <div class=\"spec\">Allogeneic Cell Therapy<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#C0E0D0\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">TRIAL<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">MELBOURNE<\u002Fdiv>\n    <div class=\"spec\">Clinical Trials<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#F0D890\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">ONC<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">New York<\u002Fdiv>\n    <div class=\"spec\">Oncology<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#C0CCD8\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">MICRO<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">Boston<\u002Fdiv>\n    <div class=\"spec\">Tools Development<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#A0D878\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">FERM<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">MONTERREY<\u002Fdiv>\n    <div class=\"spec\">Industrial Biotech<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#D4E8F4\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">PHARM<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">SAN JUAN<\u002Fdiv>\n    <div class=\"spec\">Pharma Manufacturing<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#E8C4C4\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">TEST<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">United Kingdom<\u002Fdiv>\n    <div class=\"spec\">Diagnostics<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#B8D898\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">GREEN<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">Buenos Aires<\u002Fdiv>\n    <div class=\"spec\">DeSci / Agriculture<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#F0E0B0\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">LUX<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">Paris<\u002Fdiv>\n    <div class=\"spec\">Luxury Technology<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#D4D8E4\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\" style=\"font-size:14px\">SENS<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">Zurich<\u002Fdiv>\n    <div class=\"spec\">Sensor Development<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#F0C8C0\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">CRO<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">Shanghai<\u002Fdiv>\n    <div class=\"spec\">Contract Research<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" style=\"background:#C8D4E4\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\">FAB<\u002Fspan><span class=\"haus\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\">Shenzhen<\u002Fdiv>\n    <div class=\"spec\">Fabrication<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" id=\"neurohaus\" style=\"background:#D4CFEC\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\" style=\"color:#3A306A;\">NEURO<\u002Fspan><span class=\"haus\" style=\"color:#3A306A;\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\" style=\"color:#3A306A;\">Baltimore<\u002Fdiv>\n    <div class=\"spec\" style=\"color:#3A306A;\">Neurotech<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" id=\"warhaus\" style=\"background:#C8CBD0\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\" style=\"color:#3A3D45;\">WAR<\u002Fspan><span class=\"haus\" style=\"color:#3A3D45;\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\" style=\"color:#3A3D45;\">Warsaw<\u002Fdiv>\n    <div class=\"spec\" style=\"color:#3A3D45;\">Defense<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" id=\"bluehaus\" style=\"background:#BCE0EC\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\" style=\"color:#15607E;\">BLUE<\u002Fspan><span class=\"haus\" style=\"color:#15607E;\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\" style=\"color:#15607E;\">Miami<\u002Fdiv>\n    <div class=\"spec\" style=\"color:#15607E;\">Marine Technology<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tile\" id=\"pubhaus\" style=\"background:#F0CEDC\">\n    <img class=\"mark\" src=\"98e8a3d1-67dd-4bb4-b357-93c6ceaf65ea\" alt=\"\">\n    <div class=\"wm\"><span class=\"pre\" style=\"color:#8A2D52;\">PUB<\u002Fspan><span class=\"haus\" style=\"color:#8A2D52;\">HAUS<\u002Fspan><\u002Fdiv>\n    <div class=\"city\" style=\"color:#8A2D52;\">Los Angeles<\u002Fdiv>\n    <div class=\"spec\" style=\"color:#8A2D52;\">Science Media<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\nfunction setCol(n) {\n  document.getElementById('grid').style.gridTemplateColumns = 'repeat('+n+',1fr)';\n  document.querySelectorAll('.col-btn').forEach(function(b) {\n    var active = parseInt(b.dataset.n) === n;\n    b.classList.toggle('active', active);\n  });\n}\nfunction toggle(sel, show) {\n  document.querySelectorAll(sel).forEach(function(el) {\n    el.style.display = show ? '' : 'none';\n  });\n}\nfunction toggleNeuro(show) {\n  document.getElementById('neurohaus').style.display = show ? '' : 'none';\n}\nfunction toggleWar(show) {\n  document.getElementById('warhaus').style.display = show ? '' : 'none';\n}\nfunction toggleBlue(show) {\n  document.getElementById('bluehaus').style.display = show ? '' : 'none';\n}\nfunction togglePub(show) {\n  document.getElementById('pubhaus').style.display = show ? '' : 'none';\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
